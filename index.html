  { sku:'1568', cat:'laminator', name:'Bugle Head Driller — #10 × 5"', desc:'Maximum-length laminator for deep multi-layer assemblies. Specialty fire-rated walls and extra-thick commercial assemblies requiring penetration through multiple board layers into structural steel.', meta:'24 lb / 1M', env:'int' },
];

let activecat = 'all';

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = data.filter(d => {
    const matchCat = activecat === 'all' || d.cat === activecat;
    const matchQ = !q || d.sku.toLowerCase().includes(q) || d.name.toLowerCase().includes(q) || d.desc.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  document.getElementById('count').textContent = filtered.length + ' fasteners shown';

  const byCat = {};
  filtered.forEach(d => { if (!byCat[d.cat]) byCat[d.cat] = []; byCat[d.cat].push(d); });

  let html = '';
  if (filtered.length === 0) {
    html = '<div class="empty">No fasteners match your search.</div>';
  } else {
    const order = activecat === 'all' ? cats.map(c => c.id) : [activecat];
    order.forEach(cid => {
      if (!byCat[cid]) return;
      const ci = cats.find(c => c.id === cid);
      html += `<div class="section"><div class="section-title"><span class="dot" style="background:${ci.color}"></span>${ci.label} <span style="font-weight:400;color:#bbb">(${byCat[cid].length})</span></div><div class="grid">`;
      byCat[cid].forEach(d => {
        const tag = d.env === 'ext'
          ? '<span class="tag tag-ext">Exterior</span>'
          : '<span class="tag tag-int">Interior</span>';
        html += `<div class="card">
          <div class="sku-badge">${d.sku}</div>
          <div class="card-body">
            <div class="card-name">${d.name}</div>
            <div class="card-desc">${d.desc}</div>
            <div class="card-meta">${tag}<span>${d.meta}</span></div>
          </div>
        </div>`;
      });
      html += '</div></div>';
    });
  }
  document.getElementById('output').innerHTML = html;
}

function buildFilters() {
  const row = document.getElementById('filters');
  let html = `<span class="pill active" onclick="setcat('all',this)">All categories</span>`;
  cats.forEach(c => { html += `<span class="pill" onclick="setcat('${c.id}',this)">${c.label}</span>`; });
  row.innerHTML = html;
}

function setcat(id, el) {
  activecat = id;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  render();
}

buildFilters();
render();
</script>
</body>
